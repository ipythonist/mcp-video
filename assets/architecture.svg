<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 540" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="860" y2="540">
      <stop offset="0%" stop-color="#0f0f1a"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e1e3a"/>
      <stop offset="100%" stop-color="#16162b"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <marker id="a1" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#6c5ce7"/></marker>
    <marker id="a2" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#00b894"/></marker>
    <marker id="a3" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#e17055"/></marker>
  </defs>

  <!-- Background -->
  <rect width="860" height="540" fill="url(#bg)" rx="12"/>

  <!-- Title -->
  <text x="430" y="38" text-anchor="middle" fill="#a29bfe" font-family="SF Mono, Consolas, monospace" font-size="24" font-weight="bold">mcp-video</text>
  <text x="430" y="58" text-anchor="middle" fill="#636e8a" font-family="SF Mono, Consolas, monospace" font-size="11">Video Intelligence MCP Server</text>

  <!-- ===== FLOW ROW ===== -->

  <!-- Step 1: Input -->
  <rect x="20" y="80" width="185" height="105" rx="10" fill="url(#card)" stroke="#6c5ce7" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="112" y="102" text-anchor="middle" fill="#a29bfe" font-family="SF Mono, Consolas, monospace" font-size="10" font-weight="bold">1. VIDEO URL</text>
  <line x1="35" y1="110" x2="190" y2="110" stroke="#2d2d4a" stroke-width="0.5"/>
  <text x="112" y="130" text-anchor="middle" fill="#dfe6e9" font-family="SF Mono, Consolas, monospace" font-size="10">YouTube</text>
  <text x="112" y="146" text-anchor="middle" fill="#dfe6e9" font-family="SF Mono, Consolas, monospace" font-size="10">Instagram / Vimeo</text>
  <text x="112" y="162" text-anchor="middle" fill="#dfe6e9" font-family="SF Mono, Consolas, monospace" font-size="10">Twitter/X</text>
  <text x="112" y="177" text-anchor="middle" fill="#636e8a" font-family="SF Mono, Consolas, monospace" font-size="9">+ 1000 more sites</text>

  <!-- Arrow 1→2 -->
  <line x1="205" y1="132" x2="235" y2="132" stroke="#6c5ce7" stroke-width="2" marker-end="url(#a1)"/>

  <!-- Step 2: Download -->
  <rect x="240" y="80" width="185" height="105" rx="10" fill="url(#card)" stroke="#00b894" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="332" y="102" text-anchor="middle" fill="#55efc4" font-family="SF Mono, Consolas, monospace" font-size="10" font-weight="bold">2. DOWNLOAD</text>
  <line x1="255" y1="110" x2="410" y2="110" stroke="#2d2d4a" stroke-width="0.5"/>
  <text x="332" y="130" text-anchor="middle" fill="#dfe6e9" font-family="SF Mono, Consolas, monospace" font-size="10">yt-dlp fetch</text>
  <text x="332" y="146" text-anchor="middle" fill="#dfe6e9" font-family="SF Mono, Consolas, monospace" font-size="10">720p cap (saves BW)</text>
  <text x="332" y="162" text-anchor="middle" fill="#dfe6e9" font-family="SF Mono, Consolas, monospace" font-size="10">Extract metadata</text>

  <!-- Arrow 2→3 -->
  <line x1="425" y1="132" x2="455" y2="132" stroke="#00b894" stroke-width="2" marker-end="url(#a2)"/>

  <!-- Step 3: Process -->
  <rect x="460" y="80" width="185" height="105" rx="10" fill="url(#card)" stroke="#e17055" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="552" y="102" text-anchor="middle" fill="#fab1a0" font-family="SF Mono, Consolas, monospace" font-size="10" font-weight="bold">3. PROCESS</text>
  <line x1="475" y1="110" x2="630" y2="110" stroke="#2d2d4a" stroke-width="0.5"/>
  <text x="552" y="130" text-anchor="middle" fill="#dfe6e9" font-family="SF Mono, Consolas, monospace" font-size="10">OpenCV keyframes</text>
  <text x="552" y="146" text-anchor="middle" fill="#dfe6e9" font-family="SF Mono, Consolas, monospace" font-size="10">Scene-change detect</text>
  <text x="552" y="162" text-anchor="middle" fill="#dfe6e9" font-family="SF Mono, Consolas, monospace" font-size="10">Caption extraction</text>

  <!-- Arrow 3→4 -->
  <line x1="645" y1="132" x2="675" y2="132" stroke="#e17055" stroke-width="2" marker-end="url(#a3)"/>

  <!-- Step 4: Return -->
  <rect x="680" y="80" width="160" height="105" rx="10" fill="url(#card)" stroke="#0984e3" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="760" y="102" text-anchor="middle" fill="#74b9ff" font-family="SF Mono, Consolas, monospace" font-size="10" font-weight="bold">4. RETURN</text>
  <line x1="695" y1="110" x2="825" y2="110" stroke="#2d2d4a" stroke-width="0.5"/>
  <text x="760" y="130" text-anchor="middle" fill="#dfe6e9" font-family="SF Mono, Consolas, monospace" font-size="10">Image frames</text>
  <text x="760" y="146" text-anchor="middle" fill="#dfe6e9" font-family="SF Mono, Consolas, monospace" font-size="10">Transcript text</text>
  <text x="760" y="162" text-anchor="middle" fill="#dfe6e9" font-family="SF Mono, Consolas, monospace" font-size="10">Video metadata</text>
  <text x="760" y="177" text-anchor="middle" fill="#636e8a" font-family="SF Mono, Consolas, monospace" font-size="9">via MCP protocol</text>

  <!-- ===== TOOLS SECTION ===== -->
  <text x="430" y="222" text-anchor="middle" fill="#636e8a" font-family="SF Mono, Consolas, monospace" font-size="13" font-weight="bold" letter-spacing="3">TOOLS</text>
  <line x1="60" y1="234" x2="800" y2="234" stroke="#2d2d4a" stroke-width="1"/>

  <!-- Tool 1: analyze_video -->
  <rect x="20" y="252" width="260" height="85" rx="8" fill="url(#card)" stroke="#6c5ce7" stroke-width="1" filter="url(#shadow)"/>
  <circle cx="40" cy="272" r="6" fill="#6c5ce7"/>
  <text x="52" y="276" fill="#a29bfe" font-family="SF Mono, Consolas, monospace" font-size="12" font-weight="bold">analyze_video</text>
  <text x="35" y="298" fill="#b2bec3" font-family="SF Mono, Consolas, monospace" font-size="9.5">Full analysis: keyframes +</text>
  <text x="35" y="313" fill="#b2bec3" font-family="SF Mono, Consolas, monospace" font-size="9.5">transcript + metadata</text>
  <text x="35" y="328" fill="#636e8a" font-family="SF Mono, Consolas, monospace" font-size="9">Returns images + text to LLM</text>

  <!-- Tool 2: extract_video_frames -->
  <rect x="300" y="252" width="260" height="85" rx="8" fill="url(#card)" stroke="#00b894" stroke-width="1" filter="url(#shadow)"/>
  <circle cx="320" cy="272" r="6" fill="#00b894"/>
  <text x="332" y="276" fill="#55efc4" font-family="SF Mono, Consolas, monospace" font-size="12" font-weight="bold">extract_video_frames</text>
  <text x="315" y="298" fill="#b2bec3" font-family="SF Mono, Consolas, monospace" font-size="9.5">Keyframe or uniform mode</text>
  <text x="315" y="313" fill="#b2bec3" font-family="SF Mono, Consolas, monospace" font-size="9.5">Scene-change detection</text>
  <text x="315" y="328" fill="#636e8a" font-family="SF Mono, Consolas, monospace" font-size="9">Configurable frame count</text>

  <!-- Tool 3: video_to_strategy -->
  <rect x="580" y="252" width="260" height="85" rx="8" fill="url(#card)" stroke="#e17055" stroke-width="1" filter="url(#shadow)"/>
  <circle cx="600" cy="272" r="6" fill="#e17055"/>
  <text x="612" y="276" fill="#fab1a0" font-family="SF Mono, Consolas, monospace" font-size="12" font-weight="bold">video_to_strategy</text>
  <text x="595" y="298" fill="#b2bec3" font-family="SF Mono, Consolas, monospace" font-size="9.5">Trading videos to Python code</text>
  <text x="595" y="313" fill="#b2bec3" font-family="SF Mono, Consolas, monospace" font-size="9.5">backtrader/zipline/freqtrade</text>
  <text x="595" y="328" fill="#636e8a" font-family="SF Mono, Consolas, monospace" font-size="9">Charts + indicators + rules</text>

  <!-- Tool 4: get_video_transcript -->
  <rect x="120" y="355" width="260" height="85" rx="8" fill="url(#card)" stroke="#0984e3" stroke-width="1" filter="url(#shadow)"/>
  <circle cx="140" cy="375" r="6" fill="#0984e3"/>
  <text x="152" y="379" fill="#74b9ff" font-family="SF Mono, Consolas, monospace" font-size="12" font-weight="bold">get_video_transcript</text>
  <text x="135" y="401" fill="#b2bec3" font-family="SF Mono, Consolas, monospace" font-size="9.5">Timestamped captions</text>
  <text x="135" y="416" fill="#b2bec3" font-family="SF Mono, Consolas, monospace" font-size="9.5">Auto or manual subtitles</text>
  <text x="135" y="431" fill="#636e8a" font-family="SF Mono, Consolas, monospace" font-size="9">YouTube caption support</text>

  <!-- Tool 5: get_frame_at_time -->
  <rect x="480" y="355" width="260" height="85" rx="8" fill="url(#card)" stroke="#fdcb6e" stroke-width="1" filter="url(#shadow)"/>
  <circle cx="500" cy="375" r="6" fill="#fdcb6e"/>
  <text x="512" y="379" fill="#ffeaa7" font-family="SF Mono, Consolas, monospace" font-size="12" font-weight="bold">get_frame_at_time</text>
  <text x="495" y="401" fill="#b2bec3" font-family="SF Mono, Consolas, monospace" font-size="9.5">Single frame capture</text>
  <text x="495" y="416" fill="#b2bec3" font-family="SF Mono, Consolas, monospace" font-size="9.5">Any timestamp in seconds</text>
  <text x="495" y="431" fill="#636e8a" font-family="SF Mono, Consolas, monospace" font-size="9">Precise moment extraction</text>

  <!-- Footer -->
  <text x="430" y="480" text-anchor="middle" fill="#636e8a" font-family="SF Mono, Consolas, monospace" font-size="10">pip install mcp-video</text>
  <text x="430" y="498" text-anchor="middle" fill="#4a4a6a" font-family="SF Mono, Consolas, monospace" font-size="9">All processing happens locally. No data sent to third-party services.</text>

  <!-- Tech badges -->
  <rect x="265" y="510" width="65" height="20" rx="4" fill="#2d2d4a"/>
  <text x="297" y="524" text-anchor="middle" fill="#a29bfe" font-family="SF Mono, Consolas, monospace" font-size="9">Python</text>
  <rect x="340" y="510" width="65" height="20" rx="4" fill="#2d2d4a"/>
  <text x="372" y="524" text-anchor="middle" fill="#55efc4" font-family="SF Mono, Consolas, monospace" font-size="9">OpenCV</text>
  <rect x="415" y="510" width="65" height="20" rx="4" fill="#2d2d4a"/>
  <text x="447" y="524" text-anchor="middle" fill="#fab1a0" font-family="SF Mono, Consolas, monospace" font-size="9">yt-dlp</text>
  <rect x="490" y="510" width="65" height="20" rx="4" fill="#2d2d4a"/>
  <text x="522" y="524" text-anchor="middle" fill="#74b9ff" font-family="SF Mono, Consolas, monospace" font-size="9">MCP</text>
</svg>
